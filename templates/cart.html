{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Cart | Trendora</title>
    <link rel="stylesheet" href="{% static 'assets/css/cart.css' %}">
</head>
<body>
     {% csrf_token %} 
  <header>
    <div class="logo">TRENDORA</div>
    <div>
      <a href="{% url 'index' %}" class="btn secondary">Continue Shopping</a>
    </div>
  </header>

  <section class="cart-container">
    <h2>Your Shopping Cart 🛒</h2>

    <table>
      <thead>
        <tr>
          <th>Product</th>
          <th>Item</th>
          <th>Price</th>
          <th>Quantity</th>
          <th>Subtotal</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td><img src="{% static 'assets/img/Classic Denim Jacket.jpg' %}" alt="Product"></td>
          <td class="product-name">Classic Denim Jacket</td>
          <td class="price">$89.99</td>
          <td><input type="number" min="1" value="1"></td>
          <td class="price">$89.99</td>
        </tr>
      </tbody>
      <tfoot>
        <tr class="total-row">
          <td colspan="4" style="text-align:right;">Total:</td>
          <td>$209.97</td>
        </tr>
      </tfoot>
    </table>

    <div class="cart-actions">
      <a href="{% url 'index' %}" class="btn secondary">← Continue Shopping</a>
      <a href="{% url 'payment' %}" class="btn">Proceed to Checkout</a>
    </div>
  </section>

  <footer>
    <p>© 2025 Trendora. Designed with style and confidence.</p>
  </footer>
</body>
</html>
