{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: #f5f5f5;
        }

        .login-container {
            width: 360px;
            background: #ffffff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 4px 12px rgba(0,0,0,0.1);
        }

        .title {
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 25px;
            color: #333;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            font-weight: 600;
            color: #444;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 15px;
        }

        input:focus {
            outline: none;
            border-color: #4c8bf5;
        }

        .btn-login {
            width: 100%;
            background: #4c8bf5;
            border: none;
            padding: 13px;
            border-radius: 8px;
            font-size: 16px;
            color: #fff;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
            
        }

        .btn-login:hover {
            background: #2f6fe3;
        }

        .error {
            color: red;
            font-size: 14px;
            text-align: center;
            margin-bottom: 10px;
        }
    </style>

</head>
<body>

    <div class="login-container">
        <div class="title">Admin Login</div>

        {% if messages %}
            {% for message in messages %}
                <div class="error">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="admin_username" placeholder="Enter admin username" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" name="admin_password" placeholder="Enter admin password" required>
            </div>

            <button class="btn-login" type="submit">Login</button>
        </form>
    </div>

</body>
</html>
