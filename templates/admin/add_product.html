{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Product | Trendora</title>
    <link rel="stylesheet" href="{% static 'assets/css/add_product.css' %}">
</head>
<body>

<div class="container">
    <h2>Add New Product</h2>

    <form method="POST" enctype="multipart/form-data" class="product-form">
        {% csrf_token %}

        <div class="form-row">
            <div class="form-group">
                <label>Product Name</label>
                <input type="text" name="name" required>
            </div>

            <div class="form-group">
                <label>Price</label>
                <input type="number" step="0.01" name="price" required>
            </div>

            <div class="form-group">
                <label>Product Image</label>
                <input type="file" name="image" required>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group full">
                <label>Description</label>
                <textarea name="description" rows="3" required></textarea>
            </div>
        </div>

        <button type="submit" class="btn">Add Product</button>
    </form>


    <h3 class="list-title">Products List</h3>

    <table class="product-table">
        <thead>
            <tr>
                <th>Name</th>
                <th>Price</th>
                <th>Description</th>
                <th>Image</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody>
            {% for p in products %}
            <tr>
                <td>{{ p.name }}</td>
                <td>{{ p.price }}</td>
                <td>{{ p.description }}</td>
                <td><img src="{{ p.image.url }}" alt="Image"></td>
                <td>
                    <a class="delete-btn" href="{% url 'delete' p.id %}">Delete</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

</div>

</body>
</html>
